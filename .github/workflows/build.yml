name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - 'v*-test'
  workflow_dispatch:
    inputs:
      environment:
        description: '构建环境'
        required: true
        type: choice
        options:
          - production
          - test
        default: 'production'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            target: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          npm ci

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: npm ci

      - name: Build app (test)
        if: contains(github.ref_name, '-test') || github.event.inputs.environment == 'test'
        run: npx tauri build ${{ matrix.args }}
        env:
          AIDI_ENV: test

      - name: Build app (production)
        if: "!contains(github.ref_name, '-test') && github.event.inputs.environment != 'test'"
        run: npx tauri build ${{ matrix.args }}
        env:
          AIDI_ENV: production

      - name: Upload macOS artifacts (test)
        if: matrix.platform == 'macos-latest' && (contains(github.ref_name, '-test') || github.event.inputs.environment == 'test')
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-test
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload macOS artifacts (production)
        if: matrix.platform == 'macos-latest' && (!contains(github.ref_name, '-test') && github.event.inputs.environment != 'test')
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-production
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload Windows artifacts (test)
        if: matrix.platform == 'windows-latest' && (contains(github.ref_name, '-test') || github.event.inputs.environment == 'test')
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-test
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Windows artifacts (production)
        if: matrix.platform == 'windows-latest' && (!contains(github.ref_name, '-test') && github.event.inputs.environment != 'test')
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-production
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  test-release:
    needs: build
    runs-on: ubuntu-latest
    if: contains(github.ref_name, '-test') || github.event.inputs.environment == 'test'
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build-test
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build-test
          path: artifacts/windows

      - name: Create Test Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: 'AIDI Desktop ${{ github.ref_name }} (Test)'
          body: |
            环境: test
            这是一个测试版本，请勿用于生产环境。
          draft: true
          prerelease: true
          files: |
            artifacts/macos/*
            artifacts/windows/*

  production-release:
    needs: build
    runs-on: ubuntu-latest
    if: "!contains(github.ref_name, '-test') && github.event.inputs.environment != 'test'"
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build-production
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build-production
          path: artifacts/windows

      - name: Create Production Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: 'AIDI Desktop ${{ github.ref_name }}'
          body: |
            环境: production
          draft: true
          prerelease: false
          files: |
            artifacts/macos/*
            artifacts/windows/*
