name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - 'v*-test'
  workflow_dispatch:
    inputs:
      environment:
        description: '构建环境'
        required: true
        type: choice
        options:
          - prod
          - test
        default: 'prod'

permissions:
  contents: write

jobs:
  build:
    env:
      AIDI_ENV: ${{ contains(github.ref_name, '-test') && 'test' || github.event.inputs.environment || 'prod' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            target: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          npm ci

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: npm ci

      - name: Build app (test)
        if: env.AIDI_ENV == 'test'
        run: npx tauri build ${{ matrix.args }}
        env:
          AIDI_ENV: test

      - name: Build app (prod)
        if: env.AIDI_ENV == 'prod'
        run: npx tauri build ${{ matrix.args }}
        env:
          AIDI_ENV: prod

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: 'AIDI Desktop ${{ github.ref_name }}'
          body: |
            环境: ${{ contains(github.ref_name, '-test') && 'test' || 'prod' }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-test') }}
          files: |
            artifacts/macos/*
            artifacts/windows/*
