<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 外圈六边形 -->
  <polygon points="50,5 90,25 90,75 50,95 10,75 10,25"
    fill="none"
    stroke="url(#grad1)"
    stroke-width="1.5"
    opacity="0.6"
  />

  <!-- 内圈六边形 -->
  <polygon points="50,15 80,30 80,70 50,85 20,70 20,30"
    fill="none"
    stroke="url(#grad2)"
    stroke-width="1"
    opacity="0.4"
  />

  <!-- 中心圆 -->
  <circle cx="50" cy="50" r="20"
    fill="url(#grad1)"
    filter="url(#glow)"
  />

  <!-- AI 字母 -->
  <text x="50" y="56"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-weight="bold"
    font-size="16"
    fill="white"
    filter="url(#glow)"
  >AI</text>

  <!-- 科技线条 - 左上 -->
  <line x1="25" y1="25" x2="18" y2="18" stroke="#00d4ff" stroke-width="0.8" opacity="0.5" />
  <line x1="22" y1="25" x2="15" y2="18" stroke="#7c3aed" stroke-width="0.6" opacity="0.4" />

  <!-- 科技线条 - 右上 -->
  <line x1="75" y1="25" x2="82" y2="18" stroke="#00d4ff" stroke-width="0.8" opacity="0.5" />
  <line x1="78" y1="25" x2="85" y2="18" stroke="#7c3aed" stroke-width="0.6" opacity="0.4" />

  <!-- 科技线条 - 左下 -->
  <line x1="25" y1="75" x2="18" y2="82" stroke="#00d4ff" stroke-width="0.8" opacity="0.5" />
  <line x1="22" y1="75" x2="15" y2="82" stroke="#7c3aed" stroke-width="0.6" opacity="0.4" />

  <!-- 科技线条 - 右下 -->
  <line x1="75" y1="75" x2="82" y2="82" stroke="#00d4ff" stroke-width="0.8" opacity="0.5" />
  <line x1="78" y1="75" x2="85" y2="82" stroke="#7c3aed" stroke-width="0.6" opacity="0.4" />
</svg>
